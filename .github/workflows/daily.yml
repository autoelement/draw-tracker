name: Draw Tracker Daily

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  morning-agent:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 5 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python-ის მომზადება
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: დამოკიდებულებების ინსტალაცია
        run: pip install requests
      - name: აგენტის გაშვება
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_API }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python agent.py
      - name: Stake სინქრონიზაცია
        env:
          STAKE_TOKEN: ${{ secrets.STAKE_TOKEN }}
        run: python stake_sync.py

  evening-results:
    if: github.event.schedule == '0 19 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python-ის მომზადება
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: დამოკიდებულებების ინსტალაცია
        run: pip install requests
      - name: შედეგების შემოწმება
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_API }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python results.py
